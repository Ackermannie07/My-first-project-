<!DOCTYPE html>
<html>
<head>
    <title>My First Website</title>

    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 60px;
        }

        h1 {
            color: #38bdf8;
            font-size: 40px;
        }

        p {
            font-size: 18px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #38bdf8;
            border: none;
            border-radius: 8px;
            color: black;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0ea5e9;
        }
    </style>

</head>

<body>

    <h1>Welcome to my website 🤗</h1>

    <p>This is my first styled website</p>

    <p>I am learning step by step 😼</p>

    <button onclick="alert('Nice! You clicked the button 😎')">
        Click me
    </button>

</body>
</html>
