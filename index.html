<!DOCTYPE html>
<html>
<head>
    <title>My First Website</title>

    <style>
        body {
            background-color: #FCCEE8 ;
            color: white;
            font-family: Verdana, sans-serif;
            text-align: center;
            margin-top: 40px;
        }

        h1 {
            color: #E46BEF;
            font-size: 60px;
        }

        p {
            font-size: 24px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #E46BEF;
            border: none;
            border-radius: 8px;
            color: black;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #d726e8;
        }
    </style>

</head>

<body>

    <h1>Welcome to my website 🤗</h1>

    <p>This is my first styled website</p>

    <p>I am learning step by step 😼</p>

    <button onclick="alert('Nice! You clicked the button 😎')">
        Click me
    </button>

</body>
</html>
