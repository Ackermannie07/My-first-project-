<!DOCTYPE html>
<html>
<head>
    <title>My First Website</title>

    <style>
        body {
            background-color: #FCCEE8 ;
            color: #4B004B;
            font-family: Verdana, sans-serif;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            text-align: center;
            background-color: white;
            width: 90%;
            max-width: 500px;
            margin: auto;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-top: 10px;
            object-fit: cover;
        }

        h1 {
            color: #E46BEF;
            font-size: 40px;
        }

        p {
            font-size: 24px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #E46BEF;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #d726e8;
            transform: scale(1.05);
        }
    </style>

</head>

<body>

    <div class="card">

        <img id="profileImage" src="Kurt.jpeg" alt="My photo">

        <h1>Welcome to my website 🤗</h1>

        <p>This is my first styled website</p>

        <p id="message">I am learning step by step 😼</p>

        <button onclick="toggleProfile()">
            Click me
        </button>
    
    </div>

    <script>
        let changed = false;

        function toggleProfile() {
            let text = document.getElementById("message");
            let image = document.getElementById("profileImage");

            if (changed === false) {
                text.innerText = "Now I am improving my website!";
                text.style.color = "#E46BEF";

                document.body.style.backgroundColor = "#E46BEF";

                image.src = "Kurt2.jpeg";

                changed = true;
            } else {
                text.innerText = "I am learning step by step 😼";
                text.style.color = "#4B004B";

                document.body.style.backgroundColor = "#FCCEE8";

                image.src = "Kurt.jpeg";

                changed = false;
            }  
        }
    </script>

</body>
</html>
